<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VORTEX CINEMA | Login</title>
    <meta name="description" content="Login to Vortex Cinema client portal.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>
    <!-- Scroll Progress Indicator -->
    <div class="scroll-progress-container">
        <div class="scroll-progress-bar"></div>
    </div>

    <!-- Theme & RTL Controls -->
    <div class="auth-theme-toggle">
        <button class="control-btn theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
        <button class="control-btn rtl-toggle" id="rtl-toggle" aria-label="Toggle RTL Direction">
            <i class="fa-solid fa-right-left"></i>
        </button>
    </div>

    <main>
        <section class="container" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: var(--spacing-xl) 0;">
            <div class="auth-container reveal-fade">
                <div class="auth-header" style="display: flex; flex-direction: column; align-items: center; gap: 1.5rem; margin-bottom: var(--spacing-lg);">
                    <a href="index.html" class="logo"><i class="fa-solid fa-hurricane logo-icon"></i>VORTEX<span>.</span></a>
                    <h1 class="display-small" style="margin: 0; white-space: normal; line-height: 1.3;">Welcome Back</h1>
                    <p class="lead" style="margin: 0; max-width: 35ch;">Login to your Vortex Cinema account.</p>
                </div>
                
                <form class="auth-form" action="#" method="POST">
                    <div class="form-group">
                        <input type="email" placeholder="Email Address" required>
                    </div>
                    
                    <div class="form-group">
                        <div class="password-wrapper">
                            <input type="password" id="login-password" placeholder="Password" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('login-password', this)" aria-label="Toggle Password Visibility">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me" style="white-space: nowrap;">
                            <input type="checkbox" id="remember-me">
                            <span style="white-space: nowrap;">Remember me</span>
                        </label>
                        <a href="#" class="forgot-password hover-link">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn-primary" style="width: 100%; border-radius: 0;">Sign In</button>
                    
                    <div class="auth-divider">Or continue with</div>
                    
                    <button type="button" class="social-login-btn">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="social-login-btn">
                        <i class="fab fa-apple"></i> Apple
                    </button>
                    
                    <div style="text-align: center; margin-top: var(--spacing-lg); font-size: 0.9rem; color: var(--text-muted);">
                        Don't have an account? <a href="register.html" class="accent-text">Register here</a>
                    </div>
                </form>
            </div>
        </section>
    </main>



    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/rtl.js"></script>
    <script src="js/main.js"></script>
    <script>
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
